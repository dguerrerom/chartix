site_name: Chartix
site_description: Query and manage international music charts data
site_url: https://dguerrerom.github.io/chartix/
repo_url: https://github.com/dguerrerom/chartix
repo_name: chartix

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_category_heading: true
            show_submodules: true
            docstring_style: google

nav:
  - Home: index.md
  - Installation: installation.md
  - CLI Reference: cli.md
  - API Reference: api.md